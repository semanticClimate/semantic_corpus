<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Warming & Temperature Rise - Review Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, select, button {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }

        th {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover {
            background: #e9ecef;
        }

        td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            vertical-align: top;
        }

        tr:hover {
            background: #f8f9fa;
        }

        tr[data-status="include"] {
            background: #d4edda;
        }

        tr[data-status="include"]:hover {
            background: #c3e6cb;
        }

        tr[data-status="exclude"] {
            background: #f8d7da;
        }

        tr[data-status="exclude"]:hover {
            background: #f5c6cb;
        }

        tr[data-status="review"] {
            background: #fff3cd;
        }

        tr[data-status="review"]:hover {
            background: #ffeaa7;
        }

        .col-pmcid {
            min-width: 120px;
            font-weight: 600;
            color: #667eea;
        }

        .col-title {
            min-width: 300px;
            font-weight: 500;
            color: #333;
        }

        .col-abstract {
            min-width: 400px;
            font-size: 13px;
            color: #666;
            max-height: 80px;
            overflow-y: auto;
        }

        .col-authors {
            min-width: 150px;
            font-size: 13px;
            color: #666;
        }

        .col-date {
            min-width: 110px;
            text-align: center;
            font-size: 13px;
        }

        .col-status {
            min-width: 100px;
        }

        .col-score {
            min-width: 60px;
            text-align: center;
        }

        .col-notes {
            min-width: 150px;
            font-size: 13px;
        }

        select.status-select {
            width: 100%;
            padding: 6px;
        }

        input.score-input {
            width: 50px;
            text-align: center;
        }

        input.notes-input {
            width: 100%;
            padding: 6px;
        }

        .doi-link {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
        }

        .doi-link:hover {
            text-decoration: underline;
        }

        .stats {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 600;
            color: #333;
        }

        .stat-value.include { color: #28a745; }
        .stat-value.exclude { color: #dc3545; }
        .stat-value.review { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Global Warming & Temperature Rise</h1>
            <p>Interactive Review Table - Create, Edit, and Manage Research Paper Reviews</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="search">Search:</label>
                <input type="text" id="search" placeholder="Search titles, authors, DOI...">
            </div>
            <div class="control-group">
                <label for="filter-status">Filter by Status:</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="include">Include</option>
                    <option value="exclude">Exclude</option>
                    <option value="review">Review</option>
                </select>
            </div>
            <div class="control-group">
                <button onclick="exportData()">📥 Export CSV</button>
                <button onclick="exportJSON()">📊 Export JSON</button>
                <button onclick="resetTable()">🔄 Reset</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="reviewTable">
                <thead>
                    <tr>
                        <th class="col-pmcid" onclick="sortTable('pmcid')">PMCID ⇅</th>
                        <th class="col-title" onclick="sortTable('title')">Title ⇅</th>
                        <th class="col-abstract" onclick="sortTable('abstract')">Abstract ⇅</th>
                        <th class="col-authors" onclick="sortTable('authors')">Authors ⇅</th>
                        <th class="col-date" onclick="sortTable('publication_date')">Date ⇅</th>
                        <th class="col-status" onclick="sortTable('review_status')">Status ⇅</th>
                        <th class="col-score" onclick="sortTable('score')">Score ⇅</th>
                        <th class="col-notes">Notes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Total Papers:</span>
                <span class="stat-value" id="total-papers">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Include:</span>
                <span class="stat-value include" id="stat-include">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Exclude:</span>
                <span class="stat-value exclude" id="stat-exclude">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Review:</span>
                <span class="stat-value review" id="stat-review">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Average Score:</span>
                <span class="stat-value" id="avg-score">0</span>
            </div>
        </div>
    </div>

    <script>
        let papers = [];
        let filteredPapers = [];
        let sortColumn = '';
        let sortDirection = 'asc';

        // Load data from JSON
        const jsonData = [
  {
    "pmcid": "PMC13050001",
    "pmid": "41940000",
    "title": "Global warming and its impact on surface temperature trends in the Arctic region",
    "abstract": "This comprehensive study examines the accelerated warming patterns observed in the Arctic region over the past four decades. We analyze temperature anomalies and their correlation with greenhouse gas concentrations.",
    "doi": "10.1038/s41558-026-00001-x",
    "authors": "Smith J, Johnson M",
    "publication_date": "2026-03-15",
    "has_pdf": false,
    "has_xml": true,
    "review_status": "review",
    "notes": "",
    "score": 8
  },
  {
    "pmcid": "PMC13050002",
    "pmid": "41940001",
    "title": "Temperature rise and ecosystem collapse: A meta-analysis of biodiversity loss",
    "abstract": "This meta-analysis synthesizes data from 500+ studies examining the relationship between global temperature increases and biodiversity loss. We found that for every 1°C rise in temperature, species loss increases exponentially.",
    "doi": "10.1111/ele.13800",
    "authors": "Chen L",
    "publication_date": "2026-02-20",
    "has_pdf": false,
    "has_xml": true,
    "review_status": "review",
    "notes": "",
    "score": 7
  },
  {
    "pmcid": "PMC13050003",
    "pmid": "41940002",
    "title": "Ocean warming and its consequences: Sea level rise and coastal vulnerability",
    "abstract": "Ocean temperatures have increased by 0.13°C per decade over the past 100 years, causing thermal expansion and accelerated ice sheet melting. This study projects sea level rise scenarios for the next century.",
    "doi": "10.1111/gcb.15200",
    "authors": "Garcia P",
    "publication_date": "2026-01-10",
    "has_pdf": false,
    "has_xml": true,
    "review_status": "review",
    "notes": "",
    "score": 9
  },
  {
    "pmcid": "PMC13050004",
    "pmid": "41940003",
    "title": "Mechanisms of climate warming: Radiative forcing and feedback loops",
    "abstract": "This review article examines the fundamental physics of greenhouse gas-induced warming, including radiative forcing calculations and positive feedback mechanisms such as ice-albedo feedback.",
    "doi": "10.1029/2025RG000800",
    "authors": "Miller R",
    "publication_date": "2026-04-05",
    "has_pdf": false,
    "has_xml": true,
    "review_status": "review",
    "notes": "",
    "score": 8
  },
  {
    "pmcid": "PMC13050005",
    "pmid": "41940004",
    "title": "Global surface temperature records: Methods, uncertainties, and trends",
    "abstract": "We compare five independent global surface temperature datasets and assess their methodological differences and uncertainties. All datasets show a consistent warming trend of approximately 0.18°C per decade.",
    "doi": "10.1126/science.2026.001",
    "authors": "Brown A, Anderson B",
    "publication_date": "2026-05-12",
    "has_pdf": false,
    "has_xml": true,
    "review_status": "review",
    "notes": "",
    "score": 9
  }
];

        papers = JSON.parse(JSON.stringify(jsonData));
        filteredPapers = [...papers];

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            filteredPapers.forEach((paper, index) => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-status', paper.review_status);
                tr.innerHTML = `
                    <td class="col-pmcid">${paper.pmcid}</td>
                    <td class="col-title">${paper.title}</td>
                    <td class="col-abstract">${paper.abstract}</td>
                    <td class="col-authors">${paper.authors}</td>
                    <td class="col-date">${paper.publication_date}</td>
                    <td class="col-status">
                        <select class="status-select" onchange="updateStatus(${index}, this.value)">
                            <option value="include" ${paper.review_status === 'include' ? 'selected' : ''}>Include</option>
                            <option value="exclude" ${paper.review_status === 'exclude' ? 'selected' : ''}>Exclude</option>
                            <option value="review" ${paper.review_status === 'review' ? 'selected' : ''}>Review</option>
                        </select>
                    </td>
                    <td class="col-score">
                        <input type="number" class="score-input" value="${paper.score}" min="1" max="10" onchange="updateScore(${index}, this.value)">
                    </td>
                    <td class="col-notes">
                        <input type="text" class="notes-input" value="${paper.notes}" placeholder="Add notes..." onchange="updateNotes(${index}, this.value)">
                    </td>
                `;
                tbody.appendChild(tr);
            });

            updateStats();
        }

        function updateStatus(index, status) {
            const originalIndex = papers.findIndex(p => p.pmcid === filteredPapers[index].pmcid);
            papers[originalIndex].review_status = status;
            filteredPapers[index].review_status = status;
            renderTable();
        }

        function updateScore(index, score) {
            const originalIndex = papers.findIndex(p => p.pmcid === filteredPapers[index].pmcid);
            papers[originalIndex].score = parseInt(score);
            filteredPapers[index].score = parseInt(score);
        }

        function updateNotes(index, notes) {
            const originalIndex = papers.findIndex(p => p.pmcid === filteredPapers[index].pmcid);
            papers[originalIndex].notes = notes;
            filteredPapers[index].notes = notes;
        }

        function updateStats() {
            const total = papers.length;
            const include = papers.filter(p => p.review_status === 'include').length;
            const exclude = papers.filter(p => p.review_status === 'exclude').length;
            const review = papers.filter(p => p.review_status === 'review').length;
            const avgScore = papers.length > 0 ? (papers.reduce((sum, p) => sum + p.score, 0) / papers.length).toFixed(1) : 0;

            document.getElementById('total-papers').textContent = total;
            document.getElementById('stat-include').textContent = include;
            document.getElementById('stat-exclude').textContent = exclude;
            document.getElementById('stat-review').textContent = review;
            document.getElementById('avg-score').textContent = avgScore;
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }

            filteredPapers.sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }

                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });

            renderTable();
        }

        document.getElementById('search').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            filteredPapers = papers.filter(p =>
                p.title.toLowerCase().includes(query) ||
                p.authors.toLowerCase().includes(query) ||
                p.doi.toLowerCase().includes(query) ||
                p.abstract.toLowerCase().includes(query)
            );
            renderTable();
        });

        document.getElementById('filter-status').addEventListener('change', function(e) {
            const status = e.target.value;
            filteredPapers = status ? papers.filter(p => p.review_status === status) : [...papers];
            renderTable();
        });

        function exportCSV() {
            let csv = 'PMCID,Title,Authors,Publication Date,Status,Score,Notes\n';
            papers.forEach(p => {
                csv += `"${p.pmcid}","${p.title}","${p.authors}","${p.publication_date}","${p.review_status}",${p.score},"${p.notes}"\n`;
            });
            downloadFile(csv, 'review_table.csv', 'text/csv');
        }

        function exportJSON() {
            const json = JSON.stringify(papers, null, 2);
            downloadFile(json, 'review_table.json', 'application/json');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function resetTable() {
            if (confirm('Are you sure you want to reset all changes?')) {
                papers = JSON.parse(JSON.stringify(jsonData));
                filteredPapers = [...papers];
                document.getElementById('search').value = '';
                document.getElementById('filter-status').value = '';
                renderTable();
            }
        }

        function exportData() {
            exportCSV();
        }

        // Initial render
        renderTable();
    </script>
</body>
</html>
